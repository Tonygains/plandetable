<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Plan de Table</title>
<style>
  body {
    font-family: Georgia, serif;
    background: #f4ecdb;
    color: #2a2118;
    margin: 0;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-style: italic;
    font-weight: normal;
    margin: 10px 0;
  }
  .subtitle {
    text-align: center;
    color: #5c4a36;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-size: 0.8rem;
    margin-bottom: 30px;
  }
  .toolbar {
    text-align: center;
    margin-bottom: 20px;
  }
  .toolbar button {
    font-family: Georgia, serif;
    background: #2a2118;
    color: #f4ecdb;
    border: none;
    padding: 8px 16px;
    margin: 0 4px;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .toolbar button:hover {
    background: #8b3a2a;
  }

  .layout {
    background: white;
    padding: 30px 20px;
    border: 1px solid #b9a684;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
    overflow-x: auto;
  }

  .u-grid {
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-rows: auto 1fr;
    gap: 20px;
    min-width: 1100px;
    margin: 0 auto;
  }
  .top-row {
    grid-column: 1 / 4;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .left-col {
    grid-column: 1;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .right-col {
    grid-column: 3;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .center {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b9a684;
    font-style: italic;
    font-size: 1.5rem;
    border: 1px dashed #b9a684;
    min-height: 300px;
  }

  .table {
    background: #faf3e2;
    border: 2px solid #5c4a36;
    border-radius: 4px;
    padding: 8px;
    position: relative;
    box-shadow: 0 2px 4px rgba(0,0,0,.08);
  }
  .table-h {
    width: 220px;
    min-height: 100px;
  }
  .table-v {
    width: 110px;
    min-height: 220px;
  }
  .label {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #5c4a36;
    color: white;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    font-style: italic;
    white-space: nowrap;
  }
  .label.head {
    background: #8b3a2a;
  }
  .seats {
    display: grid;
    gap: 4px;
    margin-top: 6px;
  }
  .table-h .seats {
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: 1fr 1fr;
  }
  .table-v .seats {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: repeat(3, 1fr);
  }
  .seat {
    background: white;
    border: 1px solid #b9a684;
    padding: 6px 4px;
    text-align: center;
    font-size: 0.8rem;
    min-height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.1;
    word-break: break-word;
    border-radius: 3px;
  }
  .seat.empty {
    background: #f0e5cc;
    color: #b9a684;
  }
  .seat.head {
    background: #c79a4d;
    color: white;
    font-weight: bold;
  }

  .info {
    text-align: center;
    margin-top: 20px;
    color: #5c4a36;
    font-style: italic;
  }

  .liste {
    background: white;
    border: 1px solid #b9a684;
    padding: 20px;
    margin-top: 30px;
  }
  .liste h2 {
    text-align: center;
    font-style: italic;
    font-weight: normal;
    color: #8b3a2a;
    margin-top: 0;
  }
  .liste-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 6px;
  }
  .invite {
    padding: 6px 10px;
    background: #faf3e2;
    border-left: 3px solid #8b3a2a;
    font-size: 0.9rem;
  }
  .invite .t {
    color: #8b3a2a;
    font-style: italic;
    font-size: 0.75rem;
    display: block;
  }

  @media print {
    body { background: white; padding: 0; }
    .toolbar, .liste { display: none; }
    .layout { border: none; box-shadow: none; }
  }
</style>
</head>
<body>

<h1>Plan de Table</h1>
<div class="subtitle">Grange Rouge · Martigny</div>

<div class="toolbar">
  <button onclick="window.print()">Imprimer</button>
</div>

<div class="layout">
  <div class="u-grid">
    <div class="top-row" id="top"></div>
    <div class="left-col" id="left"></div>
    <div class="center">❦</div>
    <div class="right-col" id="right"></div>
  </div>
  <div class="info" id="info"></div>
</div>

<div class="liste">
  <h2>Liste des invités (ordre alphabétique)</h2>
  <div class="liste-grid" id="liste-grid"></div>
</div>

<script>
// ============================================================
// DONNÉES — Modifie ici pour changer les noms ou les places
// ============================================================
const TABLES = [
  // === TABLE D'HONNEUR (haut du U) ===
  { num: 22, branch: 'top', size: '220',
    guests: ["Fabienne", "Michel", "Eric", "Annyvonne", "Pierre", "Armel"] },
  { num: 20, branch: 'top', size: '220',
    guests: ["Didier", "Fabienne", "Marco", "Sabine"] },
  { num: 18, branch: 'top', size: '220', head: true, name: "Mariés",
    guests: ["Anaïs", "Baptiste", "Vincent", "Malika", "Jean", "Jeanne"] },
  { num: 19, branch: 'top', size: '220',
    guests: ["Elisa", "Caro", "Albu", "Tania", "Amandine"] },
  { num: 17, branch: 'top', size: '220',
    guests: ["Giusep", "Diane", "Natasha", "Chris", "Gabi", "Madeline"] },

  // === BRANCHE GAUCHE (descend) ===
  { num: 16, branch: 'left', size: '220',
    guests: ["Tupp", "Claude", "Nicole", "Jean-Marc", "Roger", "Joëlle"] },
  { num: 15, branch: 'left', size: '220',
    guests: ["Holly", "Toby", "Loïc"] },
  { num: 14, branch: 'left', size: '200',
    guests: ["Laetitia", "Arnaud", "Rémi", "Jessica", "Damien", "Antonia"] },
  { num: 13, branch: 'left', size: '200',
    guests: ["Arnaud", "Axel", "Loulou", "Emma", "Fanny", "Ilam"] },
  { num: 12, branch: 'left', size: '200',
    guests: ["Jade", "Étienne", "Arnaud", "Amandine", "Guillaume", "Bastien"] },
  { num: 11, branch: 'left', size: '200',
    guests: ["Julien", "Kelly", "Annaël", "Marielle", "Romain", "Léa"] },
  { num: 10, branch: 'left', size: '200',
    guests: ["Lise", "Benoît", "Yannick", "Aurore", "Céline", "Albin"] },
  { num: 9, branch: 'left', size: '220',
    guests: ["Lucien", "Marie", "Maïté", "Nicolas"] },

  // === BRANCHE DROITE (descend) ===
  { num: 1, branch: 'right', size: '220',
    guests: ["Greg", "Nico", "Audrey", "Inès", "Joël", "Rocio"] },
  { num: 2, branch: 'right', size: '220',
    guests: ["Sam", "Lise", "Francesca", "Tim", "Christelle", "Alain"] },
  { num: 3, branch: 'right', size: '200',
    guests: ["Brice", "Louis", "Fili", "FloB", "Jérémy", "Maxime"] },
  { num: 4, branch: 'right', size: '200',
    guests: ["Nancy", "Charlotte", "Lucas", "Quentin", "Rox", "Tania B."] },
  { num: 5, branch: 'right', size: '200',
    guests: ["Solène", "Marika", "Jo", "Sébastien", "Elizabeth"] },
  { num: 6, branch: 'right', size: '200',
    guests: ["Zan", "Ju", "Laurent", "Sylvie"] },
  { num: 8, branch: 'right', size: '220',
    guests: ["Grégoire", "Isa", "Susi", "Fredy", "Monique", "Fiou"] },
  { num: 21, branch: 'right', size: '220',
    guests: ["Luna", "Léna", "Liana", "Mathis", "Livia", "Théo", "Noé"] },
];

// ============================================================
// AFFICHAGE
// ============================================================
function render() {
  const top = document.getElementById('top');
  const left = document.getElementById('left');
  const right = document.getElementById('right');
  top.innerHTML = ''; left.innerHTML = ''; right.innerHTML = '';

  TABLES.forEach(t => {
    const div = document.createElement('div');
    const isHorizontal = t.branch === 'top';
    div.className = 'table ' + (isHorizontal ? 'table-h' : 'table-v');
    if (t.head) div.style.borderColor = '#8b3a2a';

    const label = document.createElement('div');
    label.className = 'label' + (t.head ? ' head' : '');
    const tableName = t.name ? (t.name + ' (T' + t.num + ')') : ('Table ' + t.num);
    label.textContent = tableName + ' · ' + t.size + 'cm';
    div.appendChild(label);

    const seats = document.createElement('div');
    seats.className = 'seats';
    const nbSeats = Math.max(6, t.guests.length);
    for (let i = 0; i < nbSeats; i++) {
      const seat = document.createElement('div');
      const guest = t.guests[i];
      seat.className = 'seat' + (guest ? '' : ' empty') + (t.head && guest ? ' head' : '');
      seat.textContent = guest || '·';
      seats.appendChild(seat);
    }
    div.appendChild(seats);

    if (t.branch === 'top') top.appendChild(div);
    else if (t.branch === 'left') left.appendChild(div);
    else right.appendChild(div);
  });

  const totalGuests = TABLES.reduce((sum, t) => sum + t.guests.length, 0);
  document.getElementById('info').textContent =
    TABLES.length + ' tables · ' + totalGuests + ' invités';

  const all = [];
  TABLES.forEach(t => {
    t.guests.forEach(g => {
      all.push({ name: g, table: t.name ? (t.name + ' (T' + t.num + ')') : ('Table ' + t.num) });
    });
  });
  all.sort((a, b) => a.name.localeCompare(b.name, 'fr'));
  const grid = document.getElementById('liste-grid');
  grid.innerHTML = all.map(g =>
    '<div class="invite">' + g.name + '<span class="t">' + g.table + '</span></div>'
  ).join('');
}

render();
</script>

</body>
</html>
